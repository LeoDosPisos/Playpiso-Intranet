services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: proposta_comercial
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

  pptx-generator:
    build:
      context: Backend/services/pptx-generator-service
    ports:
      - "8000:8000"
    environment:
      CORS_ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:5173"

  proposta-api:
    build:
      context: Backend
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=proposta_comercial;Username=postgres;Password=postgres"
      PptxGeneratorUrl: "http://pptx-generator:8000"
      Cors__AllowedOrigins__0: "http://localhost:3000"
      Cors__AllowedOrigins__1: "http://localhost:5173"
    depends_on:
      postgres:
        condition: service_healthy
      pptx-generator:
        condition: service_started

  frontend:
    build:
      context: Frontend
      args:
        VITE_API_URL: "http://localhost:8000"
        VITE_PROPOSTA_API_URL: "http://localhost:8080"
        VITE_API_SCOPE: "api://d59319c0-6b41-497f-b233-447c78d9d391/access_as_user"
        VITE_AZURE_CLIENT_ID: "d59319c0-6b41-497f-b233-447c78d9d391"
        VITE_AZURE_TENANT_ID: "a75f3ed1-64d2-4473-b836-0b7cb2db1542"
    ports:
      - "3000:80"
    depends_on:
      - proposta-api
      - pptx-generator
