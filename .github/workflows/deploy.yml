name: Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-pptx-generator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - uses: docker/build-push-action@v5
        with:
          context: Backend/services/pptx-generator-service
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/pptx-generator:${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/pptx-generator:latest

  build-proposta-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - uses: docker/build-push-action@v5
        with:
          context: Backend
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/proposta-api:${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/proposta-api:latest

  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        working-directory: Frontend
        run: npm ci

      - name: Build
        working-directory: Frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_PROPOSTA_API_URL: ${{ secrets.VITE_PROPOSTA_API_URL }}
          VITE_API_SCOPE: ${{ secrets.VITE_API_SCOPE }}
          VITE_AZURE_CLIENT_ID: ${{ secrets.VITE_AZURE_CLIENT_ID }}
          VITE_AZURE_TENANT_ID: ${{ secrets.VITE_AZURE_TENANT_ID }}

      - name: Deploy to Azure Static Web Apps
        uses: azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: Frontend/dist
          skip_app_build: true

  deploy-pptx-generator:
    needs: build-pptx-generator
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update Container App image
        run: |
          az containerapp update \
            --name "${{ secrets.ACA_PPTX_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --image "${{ secrets.ACR_LOGIN_SERVER }}/pptx-generator:${{ github.sha }}"

  deploy-proposta-api:
    needs: build-proposta-api
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update Container App image
        run: |
          az containerapp update \
            --name "${{ secrets.ACA_API_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --image "${{ secrets.ACR_LOGIN_SERVER }}/proposta-api:${{ github.sha }}"
